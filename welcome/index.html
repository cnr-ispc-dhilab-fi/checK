    <!-- Bootstrap bundle (JS + Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        async function enterSession() {

            const sessionCode = document.getElementById("sessionCode").value.trim().toLowerCase();

            if (!sessionCode) {
                alert("Please enter a session code.");
                return;
            }

            // Look up session code in records
            const records = await ATON.App.getStorage(RECORDS_STORAGE_ID) || {};

            let projectId   = null;
            let sessionData = null;

            for (const pid of Object.keys(records)) {
                if (records[pid][sessionCode]) {
                    projectId   = pid;
                    sessionData = records[pid][sessionCode];
                    break;
                }
            }

            if (!projectId || !sessionData) {
                alert("Session code not found. Please check the code and try again.");
                return;
            }

            const { subjectID, group, measure } = sessionData;

            // Retrieve protocol storage
            const protocolStorage = await ATON.App.getStorage(getProjectProtocolConfigStorageId(projectId));

            const runID  = `${subjectID}-G${group}-M${measure}`;
            const sceneID = protocolStorage[`${group},${measure}`]["phase"][1]["sceneID"];

            const mkgid     = "check-user-" + sceneID;
            const kaptoPars = `mk.hub=https://interlumo.ispc.cnr.it/kapto/&mk.freq=200&mk.attr=pos,dir&mk.dur=900&mk.gid=${mkgid}`;

            const targetURL = `http://localhost:8080/a/checK/project-run/scene.html?sid=check-user/${sceneID}&id=${projectId}&run=${runID}&sc=${sessionCode}&r=1&${kaptoPars}`;

            window.location.href = targetURL;
        };



    </script>
