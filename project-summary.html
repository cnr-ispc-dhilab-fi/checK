        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl)
        })
    </script>

    <script>
    window.addEventListener("load", () => {
        const projectId = getIdFromURL();
        if (projectId) {
            renderProjectSummaryFromStorage();
        }
    });

    const carouselContainer = document.getElementById("summary-carousel-inner");

    async function createCarousel(id, counter) {
        const uploadJSON = await readUploadJson();

        if (!uploadJSON[id]) {
            console.error("ID non trovato in upload.json:", id, uploadJSON);
            return;
        }

        if (!uploadJSON[id].thumb) {
            console.error("Nessuna thumb per ID:", id, uploadJSON[id]);
            return;
        }

        // Costruisco la URL assoluta della thumbnail
        const thumbUrl = "http://localhost:3001" + uploadJSON[id].thumb.url;
        console.log("Thumbnail URL per ID", id, ":", thumbUrl);

        if (counter === 0) {
            const carousitem_html = `
                <div class="carousel-item active">
                <img src="${thumbUrl}" class="d-block w-100" alt="thumbnail ambiente ${id}">
                </div>`;
        } else {
            const carousitem_html = `
                <div class="carousel-item">
                <img src="${thumbUrl}" class="d-block w-100" alt="thumbnail ambiente ${id}">
                </div>`;
        }

        // insertAdjacentHTML si aspetta una stringa
        carouselContainer.insertAdjacentHTML("beforeend", carousitem_html);
    }
    </script>
