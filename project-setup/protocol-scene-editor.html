<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="/res/aton-logo.png" sizes="512x512" type="image/png">

    <!-- Add iOS meta tags and icons -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="ATON Sample">
    <link rel="apple-touch-icon" href="/res/aton-logo.png">
    <meta name="description" content="ATON Sample">
    <!-- Add meta theme-color -->
    <meta name="theme-color" content="#000000" />

    <meta name="aton:appid" content="checK">

    <title>checK - Phase Scene Editor</title>
    <link rel="stylesheet" type="text/css" href="/res/css/aton.css">
    <link rel="stylesheet" href="../css/bootstrap-check.css">
    <link rel="stylesheet" href="/res/css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        /* --- Typography setup --- */
        /* Import fonts */
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap');


        /* Headings (all levels) */
        h1, h2, h3, h4, h5, h6 {
        font-family: "Crimson Pro", serif;
        }

        /* Paragraphs and general body text */
        p, li, a, span, button, input, textarea {
        font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI",
                    Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif,
                    "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji" !important; 
        }

        /* Global fallback for the body */
        body {
            font-family: "DM Sans", sans-serif !important;
        }
        /* -------------- */

        /* --- Custom setting --- */
        #idTopToolbar {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .aton-std-bg {
            background-color: var(--bs-gray-100) !important;
        }

        .legenda-icon-modal {
            margin-bottom: 1em;
        }
    </style>

    <script type="text/javascript" src="/vendors/vendors.min.js"></script>
    <script type="text/javascript" src="/vendors/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="/dist/THREE.bundle.js"></script>
    <script type="text/javascript" src="/dist/ATON.min.js"></script>
    <script>
        // Extract scene ID for URL
        const params = new URLSearchParams(window.location.search);
        const s_id = `check-user/${params.get("sid")}`;

        let currentPov = [] // initialise current pos for main button

        let APP = ATON.App.realize();

        APP.setup = ()=>{
            // Realize base ATON and add base UI events
            ATON.realize();
            ATON.UI.addBasicEvents();

            // Load the scene
            ATON.App.loadScene(s_id, ()=>{ 

                // Set first-person navigation
                ATON.Nav.setFirstPersonControl();

                // === Ancillary functions ===

                // A. Help modal
                window.openInfoPopUp = function() {
                    ATON.UI.showModal({
                            header: "Edit you scene",
                            body: ATON.UI.createContainer({
                                items: [
                                    ATON.UI.elem(`<p>In this page you can customise your current scene. In particular, you need to select in which <b>point the subjects will begin their exploration</b> (Home POV).</p>`),
                                    ATON.UI.elem(`<p>To move in the environment, <b>double-tap on the floor of the scene</b>. A white circle will appear to support you.</p>`),
                                    ATON.UI.elem(`<p>Once you reach the starting position and facing the desired direction, you can set this <b>'point of view' as Home POV</b></p>`),
                                    ATON.UI.elem(`<div class="container mt-2">
                                        <div class="row legenda-icon-modal"><div class="col-3"><img style="background-color: var(--bs-primary); border-radius: 10%; width: 42px" src="http://localhost:8080/res/icons/pov.png"></div><div class="col-9">Set current position as Home POV</div></div>
                                        <div class="row legenda-icon-modal"><div class="col-3"><img style="background-color: var(--bs-gray-600); border-radius: 10%; width: 42px" src="http://localhost:8080/res/icons/home.png"></div><div class="col-9">See current Home POV</div></div>
                                        <div class="row legenda-icon-modal"><div class="col-3"><img style="background-color: var(--bs-gray-600); border-radius: 10%; width: 42px" src="http://localhost:8080/res/icons/back.png"></div><div class="col-9">Go back to main platform</div></div>
                                        `)
                                    ]
                                })
                            });
                }

                // B. Set Home POV
                window.setHomePOV = function(pov) {
                    const sid = params.get("sid");

                    ATON.Nav.setHomePOV(pov);
                    ATON.UI.hideModal();

                    // - - Update JSON / Alternative to SceneHub, requiring auth (error 401), 

                    // Update in-memory scene data
                    if (!ATON.SceneHub.currData.viewpoints) ATON.SceneHub.currData.viewpoints = {};
                    ATON.SceneHub.currData.viewpoints["home"] = {
                        position: [pov.pos.x, pov.pos.y, pov.pos.z],
                        target:   [pov.target.x, pov.target.y, pov.target.z],
                        fov:      pov.fov
                    };

                    // Write full scene JSON to check server (no auth required)
                    fetch(`http://localhost:3001/projects/check/upload/scenes/${sid}`, { // Defined at l.554, check-server.js in check-flare
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(ATON.SceneHub.currData)
                    })
                    .then(r => r.json())
                    .then(() => console.log("Home POV saved for scene:", sid))
                    .catch(err => console.error("Error saving scene:", err));
                }

                // == Edit the interface with UI ==

                // Welcome UI
                openInfoPopUp();

                ATON.UI.get("idTopToolbar").append(
                    // 1.  Back to checK platform
                    ATON.UI.createButtonBack(),

                    // 2. See home POV
                    ATON.UI.createButtonHome(),

                    // 3. Set current pos as home POV << Main button ! !

                    ATON.UI.createButton({
                        variant:"primary",
                        icon: "pov",
                        text: "Set Home POV",
                        onpress: ()=>{
                            currentPov = ATON.Nav.copyCurrentPOV();
                            ATON.UI.showModal({
                            header: "Set current position as Home POV",
                            body: ATON.UI.createContainer({
                                
                                items: [
                                    "You are currently staying in position:",

                                    ATON.UI.createVectorControl({
                                        vector: new THREE.Vector3(
                                            Math.round(currentPov.pos.x * 1000) / 1000,
                                            Math.round(currentPov.pos.y * 1000) / 1000,
                                            Math.round(currentPov.pos.z * 1000) / 1000
                                        )
                                    }),

                                    "You are currently watching in direction:",

                                    ATON.UI.createVectorControl({
                                        vector: new THREE.Vector3(
                                            Math.round(currentPov.target.x * 1000) / 1000,
                                            Math.round(currentPov.target.y * 1000) / 1000,
                                            Math.round(currentPov.target.z * 1000) / 1000
                                        )
                                    }),

                                    /*ATON.UI.createButton({
                                        variant:"success",
                                        text: "Set Current Position as Home POV",
                                    })*/
                                 
                                    ATON.UI.elem(`<button type="button" id="btnPOVsetHome" onclick="setHomePOV(currentPov)" class="btn btn-primary w-100">Set home</button>`)
                                    ]
                                })
                            });
                        }
                    }),   

                    // 4. Help

                    ATON.UI.createButton({
                        variant:"secondary",
                        icon: "help",
                        text: "Help",
                        onpress: ()=>{
                            openInfoPopUp()
                        }
                    })

                );

            });
        }

            
    </script>
</head>

<body oncontextmenu="return false;">

    <!-- Top Toolbar -->
    <div id="idTopToolbar" class="atonToolbar atonToolbar-top-left">
    </div>

    <!-- Bottom Toolbar -->
    <div id="idBottomToolbar" class="atonToolbar atonToolbar-bottom">
        <div class="d-flex align-items-center me-auto justify-content-end" style="margin-left: 1em ">
            <a class="navbar-brand d-flex align-items-center" href="../index.html">
                <img src="../img/logo-white.png" alt="checK" height="40" class="me-2">
            </a>
        </div>
    </div>

    <!-- Main Popup -->
    <div id="idPopup" class="atonPopupContainer" style="display:none;"></div>

    <!-- Loader -->
    <div id="idLoader" class="atonCenterLoader" style="display:none;"></div>

    <!-- Powered by -->
    <div id='idPoweredBy' class="atonToolbar atonToolbar-bottom poweredBy" >
        Powered by <a href="http://osiris.itabc.cnr.it/scenebaker/index.php/projects/aton/" style="color: white;" target="_blank">ATON</a>
    </div>
</body>
