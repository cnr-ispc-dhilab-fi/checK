    <!-- Add project ID -->
    <script>

        window.addEventListener('DOMContentLoaded', function () {
            console.log("!!!!!");
            document.getElementById("projectId").innerHTML = getIdFromURL();
        });

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <!-- LEFT SIDE -->
            <div class="d-flex align-items-center me-auto">
                <a class="navbar-brand d-flex align-items-center" href="../index.html">
                    <img src="../img/logo-white.png" alt="checK" height="40" class="me-2">
                </a>
            </div>

            <!-- TOGGLER (for small screens) -->
            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- RIGHT SIDE -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-white"
                            href="https://github.com/dhilab-fi/checK">Documentation</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="https://github.com/dhilab-fi/checK#acknowledgments">Credits</a></li>
                </ul>
            </div>
        </div>
    </nav>


    <div class="container my-3">
        <div id="arrow-back-container">
            <i class="bi bi-arrow-left" onclick="redirect(false)"></i>
        </div>
        <div class="row mt-4">
            <div class="col-md-12 col-sm-12">
                <h1 id="sect-title"> </h1>
            </div>
        </div>

        <!-- TEMPLATE SELECTION SECTION -->
        <div class="row gx-10 mt-3 mb-5">
            <div class="col-12 justify-content-center" style="background-color: var(--bs-secondary-disabled); border-radius: 0.25rem; padding-bottom: 1em;">

                <h3 class="mt-2">Onboarding the subject to a new experimental session</h3>

                <div class="row mt-3">
                    <div class="col-3 align-self-center">
                        <p>Project identifier</p>
                    </div>
                    <div class="col-9">
                        <p id="projectId" class="text-muted"></p>
                    </div>
                </div>

                <div class="row mt-2">
                    <div class="col-3 align-self-center">
                        <p>Subject unique identifier <span style="color: var(--bs-danger)">*</span></p>
                    </div>
                    <div class="col-9">
                        <div class="form-group">
                            <input type="text" class="form-control" id="subjPseudoCode"
                                aria-describedby="pseudoCodeHelp" placeholder="Enter subject's pseudocode">
                        </div>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-3 align-self-center">
                        <p>Reference Group <span style="color: var(--bs-danger)">*</span></p>
                    </div>
                    <div class="col-9">
                        <div class="form-group">
                            <select id="refGroup" class="form-control">
                                <option value="" selected disabled>Choose...</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-3 align-self-center">
                        <p>Current Repeated Measure <span style="color: var(--bs-danger)">*</span></p>
                    </div>
                    <div class="col-9">
                        <div class="form-group">
                            <select id="refMeasure" class="form-control">
                                <option value="" selected disabled>Choose...</option>
                            </select>
                        </div>
                    </div>
                </div>

                <h5 class="mt-4">Additional information on the subject</h5>

                <div class="row mt-3">
                    <div class="col-3 align-self-center">
                        <p>Gender</p>
                    </div>
                    <div class="col-9">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1"
                                value="f">
                            <label class="form-check-label" for="inlineRadio1">Female</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2"
                                value="m">
                            <label class="form-check-label" for="inlineRadio2">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio3"
                                value="o">
                            <label class="form-check-label" for="inlineRadio3">Other</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio3"
                                value="x">
                            <label class="form-check-label" for="inlineRadio3">Prefer not to say</label>
                        </div>
                    </div>
                    <div class="col-3 align-self-center">
                        <p>Age</p>
                    </div>
                    <div class="col-9">
                        <div class="form-group">
                            <input type="text" class="form-control" id="subjAge" aria-describedby="ageHelp"
                                placeholder="Enter subject's age">
                        </div>
                    </div>
                </div>

                <div class="row mt-2">
                    <div class="d-flex justify-content-center">
                        <button type="button" class="btn btn-primary" onclick="redirect(true)">Start the
                            experiment</button>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap bundle (JS + Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        window.addEventListener('DOMContentLoaded', async function () {

            projectId = getIdFromURL()
            const configStorage = await ATON.App.getStorage(getProjectConfigStorageId(projectId));

            // Title
            document.getElementById("sect-title").textContent = `${configStorage["title"]}`;

            // Group select
            let selectGroupEl = document.getElementById("refGroup");
            for (let i = 1; i <= parseInt(configStorage["groups"]); i++) {
                selectGroupEl.insertAdjacentHTML("beforeend", `<option value="${i}">Group ${i}</option>`);
            }

            // Measure select
            let selectMeasureEl = document.getElementById("refMeasure");
            for (let i = 1; i <= parseInt(configStorage["repeatedMeasures"]); i++) {
                selectMeasureEl.insertAdjacentHTML("beforeend", `<option value="${i}">Repeated Measure ${i}</option>`);
            }
        });

        async function redirect(isForward) {

            projectId = getIdFromURL()

            if (isForward) {
                const subjPseudoCode = document.getElementById("subjPseudoCode").value.trim();
                const subjGroup      = document.getElementById("refGroup").value;
                const subjMeasure    = document.getElementById("refMeasure").value;

                if (!subjPseudoCode || !subjGroup || !subjMeasure) {
                    Swal.fire({
                        icon: "warning",
                        title: "Required fields missing",
                        text: "Please fill in Subject ID, Group and Measure before starting.",
                        confirmButtonColor: "var(--bs-primary)"
                    });
                    return;
                }

                const genderEl = document.querySelector('input[name="inlineRadioOptions"]:checked');
                const ageVal   = document.getElementById("subjAge").value.trim();

                const extra = {};
                if (genderEl) extra.gender = genderEl.value;
                if (ageVal)   extra.age    = ageVal;

                const sessionCode = await createSessionRecord(projectId, subjPseudoCode, subjGroup, subjMeasure, extra);

                window.location.href = `experiment.html?id=${projectId}&sc=${sessionCode}&r=0`;
            } else {
                window.location.href = `../project-setup/protocol-summary.html?id=${projectId}`;
            }

        }

        // To update the select forms with the group and measure info - in onboarding.html

        async function updateGMSelect() {

            projectId = getIdFromURL()

            const configStorage = await ATON.App.getStorage(getProjectConfigStorageId(projectId));

            let selectGroupEl = document.getElementById("selectGroup");
            for (let i = 1; i <= parseInt(configStorage["groups"]); i++) {
                selectGroupEl.insertAdjacentHTML("beforeend", `<option value="${i}">Group ${i}</option>`);
            }

            let selectMeasureEl = document.getElementById("selectMeasure");
            for (let i = 1; i <= parseInt(configStorage["repeatedMeasures"]); i++) {
                selectMeasureEl.insertAdjacentHTML("beforeend", `<option value="${i}">Repeated Measure ${i}</option>`);
            }
        }

    </script>
</body>
